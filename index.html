<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dow Strategic Account Plan Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .editable-table td { padding: 10px; border: 1px solid #e2e8f0; vertical-align: top; }
        .ai-loading { animation: pulse 1.5s infinite; opacity: 0.5; pointer-events: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="confirmation-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-[60]">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm mx-auto">
            <h3 class="text-lg font-bold text-slate-800 mb-4">Confirm Reset</h3>
            <p class="text-slate-600 mb-6">Are you sure you want to clear all fields?</p>
            <div class="flex justify-end space-x-3">
                <button id="cancel-reset" class="bg-slate-200 p-2 rounded">Cancel</button>
                <button id="confirm-reset" class="bg-red-600 text-white p-2 rounded">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4 sm:p-8">
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-700 uppercase tracking-widest border-b-2 border-red-600 pb-1">Strategic Account Plan</h1>
        </div>

        <div class="flex justify-center items-center space-x-4 mb-8 no-print">
             <button id="reset-form" class="bg-gray-600 text-white font-bold py-2 px-6 rounded-lg">Reset Form</button>
             <button id="download-pdf" class="bg-red-600 text-white font-bold py-2 px-6 rounded-lg">Download PDF</button>
        </div>

        <div id="account-plan-form" class="bg-white p-8 sm:p-12 shadow-2xl rounded-xl border max-w-4xl mx-auto">
            <div class="border-b-4 border-red-600 pb-4 mb-10">
                <label class="block text-xs font-bold text-red-600 uppercase mb-1">Customer / Account Name</label>
                <input type="text" id="customer-name" placeholder="[Enter Full Company Name]" class="w-full text-3xl font-bold p-2 focus:outline-none">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 mb-12">
                <div class="flex flex-col"><label class="text-xs uppercase font-bold text-slate-500">Date</label><input type="date" class="p-2 border rounded"></div>
                <div class="flex flex-col"><label class="text-xs uppercase font-bold text-slate-500">Manager</label><input type="text" class="p-2 border rounded"></div>
                <div class="flex flex-col"><label class="text-xs uppercase font-bold text-slate-500">Cycle</label><input type="text" class="p-2 border rounded"></div>
            </div>

            <section class="mb-12">
                <div class="flex justify-between items-center mb-4 border-b">
                    <h3 class="text-xl font-black uppercase">1. Executive Summary</h3>
                    <button onclick="improveText(this)" class="bg-slate-100 text-xs px-3 py-1 rounded-full no-print">✨ AI</button>
                </div>
                <textarea class="w-full h-32 p-4 border rounded bg-slate-50" placeholder="Overview..."></textarea>
            </section>

            <section class="mb-12">
                <h3 class="text-xl font-black uppercase mb-4 border-b">2. Account Overview</h3>
                <div class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="font-bold text-sm text-slate-500 uppercase">Strategic Needs</h4>
                                <button onclick="improveText(this)" class="text-[10px] bg-slate-50 px-2 border no-print">✨ AI</button>
                            </div>
                            <textarea class="w-full h-24 p-3 border rounded text-sm bg-slate-50"></textarea>
                        </div>
                        <div class="relative">
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="font-bold text-sm text-slate-500 uppercase">Challenges</h4>
                                <button onclick="improveText(this)" class="text-[10px] bg-slate-50 px-2 border no-print">✨ AI</button>
                            </div>
                            <textarea class="w-full h-24 p-3 border rounded text-sm bg-slate-50"></textarea>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-sm text-slate-500 uppercase">Stakeholder Analysis</h4>
                            <button onclick="addRow('stakeholder-table')" class="text-xs bg-red-50 text-red-600 px-3 py-1 rounded no-print">+ Add Row</button>
                        </div>
                        <div class="mb-4 p-4 bg-slate-50 rounded text-[11px] grid grid-cols-3 gap-2">
                            <div><b>Role:</b> EB, Coach, Tech, User</div>
                            <div><b>Influence:</b> High, Med, Low</div>
                            <div><b>Status:</b> Supporter, Neutral, Adversary</div>
                        </div>
                        <table id="stakeholder-table" class="w-full border-collapse text-sm">
                            <thead class="bg-slate-100">
                                <tr><th class="p-2 border">Name</th><th class="p-2 border">Role</th><th class="p-2 border">Influence</th><th class="p-2 border">Status</th></tr>
                            </thead>
                            <tbody>
                                <tr><td contenteditable="true" class="border p-2"></td><td contenteditable="true" class="border p-2"></td><td contenteditable="true" class="border p-2"></td><td contenteditable="true" class="border p-2"></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        function addRow(tableId) {
            const table = document.getElementById(tableId).getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            for(let i=0; i<4; i++) {
                const cell = newRow.insertCell(i);
                cell.contentEditable = "true";
                cell.className = "border p-2";
            }
        }

        async function improveText(btn) {
            const container = btn.closest('div.relative') || btn.closest('section');
            const textarea = container.querySelector('textarea');
            if (!textarea || !textarea.value.trim()) return;

            btn.classList.add('ai-loading');
            const oldText = btn.innerHTML;
            btn.innerHTML = "✨ AI";

            try {
                // LLAMADA A TU NETLIFY FUNCTION EN LUGAR DE GOOGLE DIRECTO
                const response = await fetch('/.netlify/functions/gemini-proxy', {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Professionalize this text for a Dow Chemical account plan: "${textarea.value}"` }] }]
                    })
                });

                const data = await response.json();
                const improved = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (improved) textarea.value = improved.trim();
            } catch (err) {
                console.error("Error:", err);
            } finally {
                btn.classList.remove('ai-loading');
                btn.innerHTML = oldText;
            }
        }

        document.getElementById('download-pdf').addEventListener('click', async () => {
            const element = document.getElementById('account-plan-form');
            const canvas = await html2canvas(element);
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
            pdf.save("Account_Plan.pdf");
        });
    </script>
</body>
</html>
